# NATS server configuration for the TODO app.
#
#   4222  normal NATS clients  (the Go service + the CLI subscriber)
#   8222  monitoring           (open http://localhost:8222 in a browser)
#   8080  WebSocket            (so the browser can connect with nats.ws)
#
# Run it with:  nats-server -c nats.conf

port: 4222
http_port: 8222

websocket {
  port: 8080
  no_tls: true
}
